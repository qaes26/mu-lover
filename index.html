<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رهف - نبض القلب</title>
    <!-- استدعاء مكتبة Tailwind CSS للتصميم المتجاوب -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- استدعاء خطوط جوجل العربية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- استدعاء FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* إعدادات الخطوط والخلفية */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* لمنع التمرير بسبب القلوب المتصاعدة */
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #1a0b2e, #4b1d52, #852d5b, #4b1d52);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* أنيميشن تدرج الألوان في الخلفية */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* خط الشعر */
        .poetry-font {
            font-family: 'Amiri', serif;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.5);
            line-height: 2.2;
        }

        /* تأثير الزجاج اللامع للبطاقة (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* مؤشر الآلة الكاتبة */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: #ff9ebd;
            vertical-align: middle;
            margin-right: 4px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ستايل القلوب المتصاعدة */
        .heart-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            bottom: -10%;
            color: rgba(255, 105, 180, 0.6);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-120vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* الحفاظ على المحتوى فوق القلوب */
        .content-wrapper {
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- حاوية القلوب المتصاعدة في الخلفية -->
    <div class="heart-container" id="hearts-bg"></div>

    <div class="content-wrapper w-full max-w-3xl px-4 flex flex-col items-center justify-center h-full">
        
        <!-- بطاقة النص -->
        <div class="glass-card w-full p-8 md:p-12 rounded-3xl text-center relative overflow-hidden">
            <!-- أيقونة علوية -->
            <div class="mb-6 text-pink-300 text-3xl opacity-80 animate-pulse">
                <i class="fa-solid fa-heart"></i>
            </div>
            
            <!-- حاوية نص الآلة الكاتبة -->
            <div class="text-right inline-block mx-auto max-w-2xl w-full">
                <div id="typewriter-text" class="poetry-font text-2xl md:text-3xl lg:text-4xl text-pink-50 transition-all duration-500"></div>
                <span class="cursor" id="cursor"></span>
            </div>
        </div>

        <!-- التوقيع في الأسفل -->
        <div class="mt-auto mb-6 text-center text-sm md:text-base text-gray-300 opacity-70 tracking-wide font-light">
            إعداد <span class="font-bold text-pink-300">قيس جازي</span> &copy; 2026
        </div>

    </div>

    <script>
        // الأبيات الشعرية التي ستتم كتابتها
        const poemLines = [
            "إلى من سكنت الروح والوجدان..",
            "رهف..",
            "يا رقةَ الندى حين يعانقُ الزهر،",
            "ويا لحناً سماوياً يروي ظمأ العمر.",
            "في حروف اسمكِ تتجمعُ كل معاني الرقة،",
            "وفي عينيكِ أرى وطناً لا يعرفُ الغربة.",
            "أنتِ قصيدتي الأجمل التي لم أكتبها بعد،",
            "وحكايتي التي أتمنى ألا تنتهي..",
            "أحبكِ."
        ];

        let currentLine = 0;
        let currentChar = 0;
        const typingSpeed = 70; // سرعة الكتابة (ملي ثانية)
        const pauseBetweenLines = 1000; // التوقف بين كل سطر وسطر (ملي ثانية)
        const typewriterElement = document.getElementById('typewriter-text');
        const cursor = document.getElementById('cursor');

        // دالة الكتابة بنظام الآلة الكاتبة
        function typeWriter() {
            if (currentLine < poemLines.length) {
                if (currentChar < poemLines[currentLine].length) {
                    // إضافة الحرف التالي
                    typewriterElement.innerHTML += poemLines[currentLine].charAt(currentChar);
                    currentChar++;
                    // التركيز على المؤشر في نهاية النص
                    cursor.scrollIntoView({behavior: "smooth", block: "end", inline: "nearest"});
                    setTimeout(typeWriter, typingSpeed);
                } else {
                    // انتهى السطر، الانتقال للسطر التالي مع إضافة سطر جديد
                    typewriterElement.innerHTML += '<br><br>';
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriter, pauseBetweenLines);
                }
            } else {
                // انتهت الكتابة، جعل المؤشر يومض ببطء
                cursor.style.animation = "blink 1.5s infinite";
            }
        }

        // دالة لإنشاء القلوب المتصاعدة في الخلفية
        function createFloatingHearts() {
            const container = document.getElementById('hearts-bg');
            const heartCount = 20; // عدد القلوب في الشاشة
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('i');
                heart.classList.add('fa-solid', 'fa-heart', 'floating-heart');
                
                // أحجام عشوائية للقلوب
                const size = Math.random() * 1.5 + 0.5;
                heart.style.fontSize = `${size}rem`;
                
                // مواقع عشوائية أفقياً
                const leftPos = Math.random() * 100;
                heart.style.left = `${leftPos}%`;
                
                // تأخير عشوائي ومدة عشوائية لحركة كل قلب لتبدو طبيعية
                const animDuration = Math.random() * 10 + 10; // بين 10 و 20 ثانية
                const animDelay = Math.random() * 10;
                
                heart.style.animationDuration = `${animDuration}s`;
                heart.style.animationDelay = `${animDelay}s`;
                
                container.appendChild(heart);
            }
        }

        // بدء التنفيذ عند تحميل الصفحة
        window.onload = () => {
            createFloatingHearts();
            // تأخير بسيط قبل بدء الكتابة لإعطاء تأثير درامي
            setTimeout(typeWriter, 1500); 
        };
    </script>
</body>
</html>
